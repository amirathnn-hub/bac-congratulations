<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تهانينا</title>
<style>
body{
font-family:Arial;
background:linear-gradient(#4facfe,#00f2fe);
text-align:center;
padding:30px;
color:white;
}
.box{
background:white;
color:black;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}
button{
padding:10px 20px;
font-size:20px;
border:none;
border-radius:10px;
background:#28a745;
color:white;
cursor:pointer;
}
#page2{display:none;}
</style>
</head>
<body>

<div class="box" id="page1">
<h1>🎓 ألف مبروك 🎓</h1>
<p><b>من:</b> حنان</p>
<p><b>إلى:</b> داودي مريسة</p>
<button onclick="nextPage()">التالي</button>
</div>

<div class="box" id="page2">
<h2>🌹 ألف ألف مبروك 🌹</h2>
<p>
أتمنى لك النجاح والتوفيق في حياتك الجامعية،
وأن تحقق كل أحلامك.
</p>
<h1>🎁</h1>
<p>هذه هدية افتراضية مع خالص التهاني.</p>
</div>

<script>
function nextPage(){
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";
}
</script>

</body>
  </html>
